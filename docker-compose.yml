services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/crm
      DB_USER: crm
      DB_PASSWORD: crm
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-change-me-change-me-change-me-change-me-32+chars}
      WEBHOOK_API_KEY: ${WEBHOOK_API_KEY:-dev-webhook-key}
      WHATSAPP_MODE: ${WHATSAPP_MODE:-stub}
      TELEGRAM_MODE: ${TELEGRAM_MODE:-stub}
      OPENAI_MODE: ${OPENAI_MODE:-stub}
    ports:
      - "8080:8080"

volumes:
  pgdata:
