services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/crm
      DB_USER: crm
      DB_PASSWORD: crm
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-change-me-change-me-change-me-change-me-32+chars}
      WEBHOOK_API_KEY: ${WEBHOOK_API_KEY:-dev-webhook-key}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      LOGIN_MAX_FAILED: ${LOGIN_MAX_FAILED:-5}
      LOGIN_LOCK_MINUTES: ${LOGIN_LOCK_MINUTES:-15}
      LOGIN_RPM: ${LOGIN_RPM:-10}
      EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-false}
      EMAIL_VERIFICATION_TTL_HOURS: ${EMAIL_VERIFICATION_TTL_HOURS:-48}
      WHATSAPP_MODE: ${WHATSAPP_MODE:-stub}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      TELEGRAM_MODE: ${TELEGRAM_MODE:-stub}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      OPENAI_MODE: ${OPENAI_MODE:-stub}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMAIL_MODE: ${EMAIL_MODE:-stub}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@example.com}
      EMAIL_OWNER: ${EMAIL_OWNER:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SHEETS_MODE: ${SHEETS_MODE:-stub}
      SHEETS_SPREADSHEET_ID: ${SHEETS_SPREADSHEET_ID:-}
      SHEETS_RANGE: ${SHEETS_RANGE:-Sheet1!A:H}
      SHEETS_CREDENTIALS_JSON: ${SHEETS_CREDENTIALS_JSON:-}
    ports:
      - "8080:8080"

  dashboard:
    build: ./frontend
    depends_on:
      - app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  pgdata:
