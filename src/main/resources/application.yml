spring:
  application:
    name: customer-recovery-system
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crm}
    username: ${DB_USER:crm}
    password: ${DB_PASSWORD:crm}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
    open-in-view: true # required for TenantFilterInterceptor to activate the @Filter on the session that service-layer @Transactional methods join
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jackson:
    default-property-inclusion: non_null
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

app:
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:3000}
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-32+chars}
      issuer: codezilla-crm
      ttl-minutes: 240
    webhook:
      api-key: ${WEBHOOK_API_KEY:dev-webhook-key}
    encryption:
      key: ${APP_ENCRYPTION_KEY:} # base64-encoded 32 bytes; if empty, dev fallback derived from JWT secret (NOT for prod)
    lockout:
      max-failed: ${LOGIN_MAX_FAILED:5}
      duration-minutes: ${LOGIN_LOCK_MINUTES:15}
    email-verification:
      required: ${EMAIL_VERIFICATION_REQUIRED:false} # set true in production
      ttl-hours: ${EMAIL_VERIFICATION_TTL_HOURS:48}
  ratelimit:
    webhook:
      requests-per-minute: 60
    login:
      requests-per-minute: ${LOGIN_RPM:10}

billing:
  mode: ${BILLING_MODE:stub} # stub | real
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    pro-price-id: ${STRIPE_PRO_PRICE_ID:}

integrations:
  whatsapp:
    mode: ${WHATSAPP_MODE:stub} # stub | real
    base-url: https://graph.facebook.com/v19.0
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    access-token: ${WHATSAPP_ACCESS_TOKEN:}
    verify-token: ${WHATSAPP_VERIFY_TOKEN:}
  telegram:
    mode: ${TELEGRAM_MODE:stub}
    base-url: https://api.telegram.org
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    default-chat-id: ${TELEGRAM_CHAT_ID:}
  openai:
    mode: ${OPENAI_MODE:stub}
    base-url: https://api.openai.com/v1
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini
  email:
    mode: ${EMAIL_MODE:stub} # stub | real
    from: ${EMAIL_FROM:no-reply@example.com}
    owner: ${EMAIL_OWNER:}
  sheets:
    mode: ${SHEETS_MODE:stub} # stub | real
    spreadsheet-id: ${SHEETS_SPREADSHEET_ID:}
    range: ${SHEETS_RANGE:Sheet1!A:H}
    credentials-json: ${SHEETS_CREDENTIALS_JSON:}

logging:
  level:
    com.codezilla.crm: INFO
